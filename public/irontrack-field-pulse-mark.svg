<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="IronTrack Field Pulse">
  <defs>
    <linearGradient id="markFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f1f1f"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="#141414"/>
  <g transform="translate(50 54)">
    <!-- Flat-top hex -->
    <path
      d="M 0 -34 L 29.5 -17 L 29.5 17 L 0 34 L -29.5 17 L -29.5 -17 Z"
      fill="url(#markFace)"
      stroke="#2b2b2b"
      stroke-width="1"
    />
    <!-- Orange chevron (field / up) -->
    <path d="M 0 -30 L -11 -16 L 11 -16 Z" fill="#F37021"/>
    <!-- Site silhouette -->
    <g fill="#f4f4f5">
      <!-- Building block -->
      <rect x="-10" y="4" width="20" height="22" rx="1"/>
      <rect x="-7" y="8" width="4" height="3" rx="0.5" fill="#141414" opacity="0.35"/>
      <rect x="-1" y="8" width="4" height="3" rx="0.5" fill="#141414" opacity="0.35"/>
      <rect x="5" y="8" width="4" height="3" rx="0.5" fill="#141414" opacity="0.35"/>
      <rect x="-7" y="14" width="4" height="3" rx="0.5" fill="#141414" opacity="0.35"/>
      <rect x="-1" y="14" width="4" height="3" rx="0.5" fill="#141414" opacity="0.35"/>
      <!-- Crane boom -->
      <path d="M 4 -6 L 26 -22 L 26 -18 L 8 -6" fill="none" stroke="#f4f4f5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="26" y1="-22" x2="26" y2="-12" stroke="#f4f4f5" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </g>
</svg>
